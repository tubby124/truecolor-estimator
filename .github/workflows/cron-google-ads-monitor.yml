name: Google Ads Spend Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run allowlisted fail-closed monitor
        env:
          GOOGLE_ADS_MONITOR_BACKUP_SECRET: ${{ secrets.GOOGLE_ADS_MONITOR_BACKUP_SECRET }}
        run: |
          RESPONSE=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GOOGLE_ADS_MONITOR_BACKUP_SECRET}" \
            --write-out "\n%{http_code}" \
            https://truecolorprinting.ca/api/cron/google-ads-monitor)
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $STATUS"
          echo "Body: $BODY"
          [ "$STATUS" = "200" ]
