# Lint + test on every push to main. Mandatory gate before merge.
#
# Catches the `void supabase` bug class (commit 17c5f2a) at PR-review time
# instead of letting it slip into production.
#
# If lint fails, the PR check goes red and Railway will still deploy on
# push-to-main (we don't gate the deploy itself). Hasan is the sole engineer,
# so this is informational/early-warning rather than blocking. Iterate to a
# branch-protection rule once we have additional contributors.

name: lint-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint (includes tc-local/no-void-supabase-builder)
        run: npx eslint src/ --max-warnings=999

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Pricing contract
        run: npm run validate:pricing

      - name: Google Ads safety contracts
        run: npm run test:google-ads

      - name: Production build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
          NEXT_PUBLIC_SITE_URL: https://truecolorprinting.ca
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Paid-funnel browser contracts
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run test:e2e:pw -- e2e-playwright/seo-paid-journeys.spec.ts

  production-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Read-only production smoke suite
        env:
          SMOKE_BASE_URL: https://truecolorprinting.ca
        run: npm run test:smoke
