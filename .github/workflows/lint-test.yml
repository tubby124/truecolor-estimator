# Lint + test on every push to main. Mandatory gate before merge.
#
# Catches the `void supabase` bug class (commit 17c5f2a) at PR-review time
# instead of letting it slip into production.
#
# Railway production has Wait for CI enabled. A failed push workflow is skipped
# instead of being deployed, so this file is part of the production release
# gate rather than an informational check.

name: lint-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  postgres-outbox-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ${{ github.run_id }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Execute Google Ads outbox trigger regression
        env:
          PGPASSWORD: ${{ github.run_id }}
        run: >-
          psql
          --host 127.0.0.1
          --username postgres
          --dbname postgres
          --file scripts/google-ads/sql/outbox-trigger-regression.sql
      - name: Execute Google Ads monitor evidence ACL regression
        env:
          PGPASSWORD: ${{ github.run_id }}
        run: >-
          psql
          --host 127.0.0.1
          --username postgres
          --dbname postgres
          --file scripts/google-ads/sql/monitor-evidence-regression.sql

  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint (includes tc-local/no-void-supabase-builder)
        run: npx eslint src/ --max-warnings=999

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Pricing contract
        run: npm run validate:pricing

      - name: Google Ads safety contracts
        run: npm run test:google-ads

      - name: Production build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
          NEXT_PUBLIC_SITE_URL: https://truecolorprinting.ca
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Paid-funnel browser contracts
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run test:e2e:pw -- e2e-playwright/seo-paid-journeys.spec.ts

  production-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Read-only production smoke suite
        env:
          SMOKE_BASE_URL: https://truecolorprinting.ca
        run: npm run test:smoke
