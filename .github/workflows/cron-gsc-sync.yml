name: GSC Daily Sync

on:
  schedule:
    # Daily at 13:30 UTC (07:30 Saskatchewan). After GSC's ~3-day data lag.
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pull GSC last 7 days into Supabase
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://truecolorprinting.ca/api/cron/gsc-sync)
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $STATUS"
          echo "Body: $BODY"
          [ "$STATUS" = "200" ] || exit 1
